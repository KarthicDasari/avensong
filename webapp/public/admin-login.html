<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Avensong</title>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .login-container {
            max-width: 400px;
            margin: 100px auto;
            background: #fff;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            border: 1px solid #d1d5db;
        }

        .login-header {
            text-align: center;
            margin-bottom: 20px;
        }

        .login-header h2 {
            color: #8b1c1c;
            margin: 0;
        }

        .error-msg {
            color: #e53e3e;
            font-size: 14px;
            margin-bottom: 15px;
            display: none;
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-weight: 600;
            color: #333;
            font-size: 0.95rem;
        }

        .form-group input {
            width: 100%;
            padding: 0.75rem 1rem;
            font-size: 1rem;
            font-family: inherit;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            background: #fafafa;
            color: #333;
            transition: 0.25s ease;
            box-sizing: border-box;
        }

        .form-group input:focus {
            outline: none;
            border-color: #8b1c1c;
            box-shadow: 0 0 0 3px rgba(139, 28, 28, 0.2);
            background: #fff;
        }

        #loginForm button {
            width: 100%;
            padding: 0.85rem 1.5rem;
            font-size: 1.05rem;
            font-family: inherit;
            font-weight: 600;
            background: #8b1c1c;
            color: #fff;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.25s ease;
            margin-top: 5px;
        }

        #loginForm button:hover {
            background: #6f1616;
            transform: translateY(-1px);
            box-shadow: 0 4px 8px rgba(139, 28, 28, 0.3);
        }
    </style>
</head>

<body>
    <header class="app-header">
        <h1>Avensong</h1>
        <p>Admin Portal</p>
    </header>

    <div class="login-container">
        <div class="login-header">
            <h2>Admin Login</h2>
        </div>
        <div id="errorMsg" class="error-msg">Invalid credentials.</div>
        <form id="loginForm">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" required>
            </div>
            <button type="submit" class="btn-primary" style="width: 100%;">Sign In</button>
        </form>

        <div class="credentials-box">
            <h4>Admin Credentials</h4>
            <table>
                <thead>
                    <tr>
                        <th>Username</th>
                        <th>Password</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td><code>admin</code></td>
                        <td><code>Avensong2026!</code></td>
                    </tr>
                </tbody>
            </table>
            <p style="font-size: 0.8rem; color: #888; margin-top: 10px; font-style: italic;">
                Residents & tenants: please sign in on the <a href="/" style="color: #8b1c1c;">main packet page</a>.
            </p>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('errorMsg');

            errorMsg.style.display = 'none';

            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await res.json();
                if (!res.ok) throw new Error(data.error);

                if (data.role !== 'admin') {
                    throw new Error("Access denied. Admin role required.");
                }

                localStorage.setItem('adminToken', data.token);
                window.location.href = '/admin.html';
            } catch (err) {
                errorMsg.textContent = err.message;
                errorMsg.style.display = 'block';
            }
        });
    </script>
</body>

</html>
